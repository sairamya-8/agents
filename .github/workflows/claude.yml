name: Claude Code

on:
  issues:
    types: [opened]

jobs:
  claude:
    # Run only if @claude is in issue description
    if: contains(github.event.issue.body, '@claude')

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            The user mentioned @claude in the issue.

            Read the issue carefully.
            Implement the requested feature or fix.
            Create a new branch.
            Commit changes.
            Open a pull request with a proper description.

          claude_args: "--max-turns 10"